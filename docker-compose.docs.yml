services:
  docs:
    image: fresh_harvest_local_docs
    container_name: fresh_harvest_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./fresh_harvest:/app/fresh_harvest:z
    ports:
      - '9000:9000'
    command: /start-docs
